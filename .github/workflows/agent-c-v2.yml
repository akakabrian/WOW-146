name: Agent C exceptional case v2

on:
  push:
    branches:
      - agent-c-exceptional-case-v2
    paths-ignore:
      - agent-c-v2-ci.log
  pull_request:
    branches:
      - proof/wowii-146
  workflow_dispatch:

permissions:
  contents: write

jobs:
  exceptional:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install elan
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Resolve dependencies
        run: lake update

      - name: Download Mathlib cache
        run: lake exe cache get

      - name: Check exceptional modules
        id: exceptional
        shell: bash
        run: |
          set +e
          {
            echo '$ lake build WOW146.ExceptionalTheorem'
            lake build WOW146.ExceptionalTheorem
            echo '$ lake env lean -DwarningAsError=true WOW146/Metric.lean'
            lake env lean -DwarningAsError=true WOW146/Metric.lean
            echo '$ lake env lean -DwarningAsError=true WOW146/Exceptional.lean'
            lake env lean -DwarningAsError=true WOW146/Exceptional.lean
            echo '$ lake env lean -DwarningAsError=true WOW146/ExceptionalTheorem.lean'
            lake env lean -DwarningAsError=true WOW146/ExceptionalTheorem.lean
          } > agent-c-v2-ci.log 2>&1
          status=$?
          printf '\nEXIT_STATUS=%s\n' "$status" >> agent-c-v2-ci.log
          cat agent-c-v2-ci.log
          echo "exit_status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agent-c-v2-ci-${{ github.run_id }}
          path: agent-c-v2-ci.log

      - name: Fail job when Lean failed
        if: steps.exceptional.outputs.exit_status != '0'
        run: exit 1
