name: Verify WOWII 146

on:
  push:
    branches:
      - main
      - 'proof/**'
      - 'agent-**'
    paths-ignore:
      - lean-ci.log
  pull_request:
    branches:
      - main
      - proof/wowii-146
  workflow_dispatch:

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install elan
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Resolve dependencies
        run: lake update

      - name: Restore Formal Conjectures build cache
        uses: actions/cache@v4
        with:
          path: .lake/packages/formal_conjectures/.lake/build
          key: wow146-formal-build-${{ hashFiles('lean-toolchain', 'lakefile.toml') }}

      - name: Download Mathlib cache
        run: lake exe cache get

      - name: Verify and capture compiler log
        id: verify
        shell: bash
        run: |
          set +e
          {
            echo '$ lake build FormalConjectures.WrittenOnTheWallII.GraphConjecture146 FormalConjecturesForMathlib.WrittenOnTheWallII.GraphConjecture142Proof'
            lake build \
              FormalConjectures.WrittenOnTheWallII.GraphConjecture146 \
              FormalConjecturesForMathlib.WrittenOnTheWallII.GraphConjecture142Proof
            echo '$ lake env lean -DwarningAsError=true WOW146.lean'
            lake env lean -DwarningAsError=true WOW146.lean
            echo '$ lake --wfail build'
            lake --wfail build
          } > lean-ci.log 2>&1
          status=$?
          echo "exit_status=$status" >> "$GITHUB_OUTPUT"
          printf '\nEXIT_STATUS=%s\n' "$status" >> lean-ci.log
          exit 0

      - name: Publish compiler log
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -f lean-ci.log
          git commit -m "ci: publish Lean compiler log" || true
          git push origin HEAD:${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}

      - name: Fail job when Lean failed
        if: steps.verify.outputs.exit_status != '0'
        run: exit 1
