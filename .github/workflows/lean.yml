name: Verify WOWII 146

on:
  push:
    branches:
      - main
      - 'proof/**'
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Install elan
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Resolve dependencies
        run: lake update

      - name: Download Mathlib cache
        run: lake exe cache get

      - name: Build imported Formal Conjectures modules
        run: |
          lake build \
            FormalConjectures.WrittenOnTheWallII.GraphConjecture146 \
            FormalConjecturesForMathlib.WrittenOnTheWallII.GraphConjecture142Proof

      - name: Compile root proof target with warnings as errors
        run: lake env lean -DwarningAsError=true WOW146.lean

      - name: Build project
        run: lake --wfail build
