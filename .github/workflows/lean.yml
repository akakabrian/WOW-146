name: Verify WOWII 146

on:
  push:
    branches:
      - main
      - 'proof/**'
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Install elan
        run: |
          set -o pipefail
          curl -sSfL https://github.com/leanprover/elan/releases/download/v4.1.2/elan-x86_64-unknown-linux-gnu.tar.gz | tar xz
          ./elan-init -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Resolve dependencies
        run: lake update

      - name: Download Mathlib cache
        run: lake exe cache get

      - name: Compile root proof target with warnings as errors
        run: lake env lean -DwarningAsError=true WOW146.lean

      - name: Build project
        run: lake --wfail build
