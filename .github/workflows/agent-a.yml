name: Agent A square metric

on:
  push:
    branches:
      - agent-a-square-metric
  pull_request:
    branches:
      - proof/wowii-146
  workflow_dispatch:

permissions:
  contents: read

jobs:
  metric:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install elan
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Resolve dependencies
        run: lake update

      - name: Download Mathlib cache
        run: lake exe cache get

      - name: Build graph-square metric module
        run: lake build WOW146.GraphSquareMetric

      - name: Check warnings and axioms
        run: lake env lean -DwarningAsError=true WOW146/GraphSquareMetric.lean
